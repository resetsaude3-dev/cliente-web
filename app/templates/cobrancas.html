<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobranças</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <div class="topo">
        <h1>Cobranças</h1>

        <div class="menu">
            <a href="/dashboard">Dashboard</a>
            <a href="/clientes">Clientes</a>
            <a href="/contas">Contas</a>
            <a href="/disponiveis">Disponíveis</a>
            <a href="/manutencao">Manutenção</a>
            <a href="/cobrancas">Cobranças</a>
            <a href="/cobrados">Cobrados</a>
            <a href="/logout">Sair</a>
        </div>
    </div>

    <div class="cards">

        {% for conta in contas %}
        <div class="card card-interno">

            <h3>{{ conta.servico }}</h3>

            <p><strong>Cliente:</strong> {{ conta.cliente.nome }}</p>
            <p><strong>Login:</strong> {{ conta.login or '-' }}</p>
            <p><strong>Valor:</strong> R$ {{ '%.2f'|format(conta.valor or 0) }}</p>

            <div class="acoes">
                <!-- BOTÃO CORRETO -->
                <a href="/cobrar/{{ conta.id }}" class="btn-cobrar">Cobrar cliente</a>
            </div>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
