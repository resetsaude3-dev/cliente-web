<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">

        <div class="topo">
            <h1>Dashboard</h1>
            <div class="menu">
                <a href="/dashboard">Dashboard</a>
                <a href="/clientes">Clientes</a>
                <a href="/contas">Contas</a>
                <a href="/disponiveis">Disponíveis</a>
                <a href="/manutencao">Manutenção</a>
                <a href="/cobrancas">Cobranças</a>
                <a href="/trocar-senha">Trocar senha</a>
                <a href="/backup">Backup</a>
                <a href="/usuarios">Usuários</a>
                <a href="/logout">Sair</a>
            </div>
        </div>

        <div class="cards-resumo">
            <div class="card">
                <h3>Clientes</h3>
                <p>{{ total_clientes }}</p>
            </div>

            <div class="card">
                <h3>Contas</h3>
                <p>{{ total_contas }}</p>
            </div>

            <div class="card">
                <h3>Pendentes</h3>
                <p>{{ pendentes }}</p>
            </div>

            <div class="card">
                <h3>Pagas</h3>
                <p>{{ pagas }}</p>
            </div>

            <div class="card">
                <h3>Vence hoje</h3>
                <p>{{ vencendo_hoje }}</p>
            </div>

            <div class="card">
                <h3>Atrasadas</h3>
                <p>{{ vencidas }}</p>
            </div>
        </div>

    </div>
</body>
</html>
