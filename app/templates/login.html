<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-card-novo">
      <div class="login-logo">🔐</div>
      <h1>Bem-vindo</h1>
      <p class="login-subtitulo">Entre para acessar o sistema</p>

      {% if erro %}
        <div class="erro-login">{{ erro }}</div>
      {% endif %}

      <form method="post" action="/login" class="login-form-novo">
        <div class="campo-login">
          <label>Usuário</label>
          <input type="text" name="username" placeholder="Digite seu usuário" required>
        </div>

        <div class="campo-login">
          <label>Senha</label>
          <input type="password" name="senha" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn-login">Entrar</button>
      </form>
    </div>
  </div>
</body>
</html>
