<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Disponíveis</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <div class="topo">
      <h1>Contas Disponíveis</h1>
      <div class="menu">
        <a href="/dashboard">Dashboard</a>
        <a href="/clientes">Clientes</a>
        <a href="/contas">Contas</a>
        <a href="/disponiveis">Disponíveis</a>
        <a href="/manutencao">Manutenção</a>
        <a href="/cobrancas">Cobranças</a>
		<a href="/logout">Sair</a>
      </div>
    </div>

    <div class="cards">
      {% for conta in contas %}
        <div class="card card-interno">
          <h3>{{ conta.servico }}</h3>
          <p><strong>Login:</strong> {{ conta.login or '-' }}</p>
          <p><strong>Perfil:</strong> {{ conta.perfil or '-' }}</p>
          <p><strong>Valor:</strong> R$ {{ '%.2f'|format(conta.valor or 0) }}</p>

          <form method="post" action="/vincular-conta/{{ conta.id }}" class="form-grid">
            <select name="cliente_id" required>
              <option value="">Selecione o cliente</option>
              {% for cliente in clientes %}
                <option value="{{ cliente.id }}">{{ cliente.nome }}</option>
              {% endfor %}
            </select>

            <input type="date" name="data_vencimento" required>

            <button type="submit" class="btn success">Vincular ao cliente</button>
          </form>
        </div>
      {% else %}
        <div class="card">Nenhuma conta disponível.</div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
